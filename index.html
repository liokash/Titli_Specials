<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Voice, Always</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background-color: #FFF0F5;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 1. THE PERFECT CUSTOM BACKGROUND IMAGE */
        #scene-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 5;
            background-image: url('images/bg.jpg'); /* Points directly to your images folder */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        /* 2. MAIN INTERACTIVE WRAPPER */
        #interactive-wrapper {
            position: relative;
            width: 320px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 3. THE PLAYER DECK */
        #player-deck {
            width: 320px;
            height: 380px;
            background: linear-gradient(135deg, #E63946 0%, #D62246 100%);
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(230, 57, 70, 0.35), inset 0 3px 6px rgba(255, 255, 255, 0.4);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border: 5px solid #FFF;
            z-index: 15;
            position: relative;
        }

        #cassette-window {
            width: 100%;
            height: 240px;
            background: #c32f3c;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 3px inset rgba(0,0,0,0.2);
            position: relative;
        }

        /* 4. POLAROID WINDOW WITH COMFORTABLE FONTS & DEEP SHADOWS */
        #cassette-polaroid {
            width: 100%;
            height: 100%;
            background-color: #FFF;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .polaroid-photo-frame {
            width: 175px;
            height: 175px;
            overflow: hidden;
            border: 1.5px solid #111; /* Sleek, thin black outline */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35), 0 4px 8px rgba(0, 0, 0, 0.2); /* Intense photo glow */
            background-color: #EEE;
        }

        #polaroid-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #polaroid-message {
            font-size: 11px;
            text-align: center;
            color: #333;
            line-height: 1.5; /* Beautiful original comfortable spacing */
            font-weight: bold;
            padding: 14px 2px 2px 2px; /* Increased top padding to nudge desktop text down slightly */
            word-break: break-word;
            letter-spacing: 0.3px;
        }

        /* CASSETTE TAPE */
        #css-cassette {
            width: 180px;
            height: 110px;
            background-color: #FFC0CB;
            border-radius: 10px;
            border: 3px solid #FFF;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        #cassette-title {
            font-size: 12px;
            color: #E63946;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .reels-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .reel {
            width: 32px;
            height: 32px;
            background: #FFF;
            border-radius: 50%;
            border: 5px dashed #E63946;
        }

        .spinning .reel {
            animation: reelSpin 2.5s linear infinite;
        }
        @keyframes reelSpin { 100% { transform: rotate(360deg); } }

        #display-window {
            width: 100%;
            height: 32px;
            background: #FFF;
            border-radius: 6px;
            text-align: center;
            line-height: 32px;
            font-size: 11px;
            color: #E63946;
            font-weight: bold;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        #controls-panel {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .control-btn {
            background-color: #FFF;
            border: 2px solid #FFC0CB;
            color: #E63946;
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 11px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        /* 5. HEARTS ORBIT CONTAINER & STABLE HOVER EFFECTS */
        #orbit-container {
            position: absolute;
            width: 560px;
            height: 560px;
            z-index: 8;
            animation: rotateOrbit 30s linear infinite;
            pointer-events: none;
        }

        .heart-wrapper {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 50%;
            left: 50%;
            pointer-events: auto;
        }

        .heart-scaler {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-scaler:hover {
            transform: scale(1.3); /* Perfectly zooms without turning sideways */
        }

        .heart {
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: counterRotate 30s linear infinite; /* Keeps hearts vertical */
        }

        .heart-num {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            color: #FFF;
            font-family: Arial, sans-serif;
            top: 42%;
            transform: translateY(-50%);
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
        }

        /* Positions mapped to uniform 8-heart orbit path (280px radius) */
        .h1 { transform: translate(-50%, -50%) translate(0px, -280px); }
        .h2 { transform: translate(-50%, -50%) translate(198px, -198px); }
        .h3 { transform: translate(-50%, -50%) translate(280px, 0px); }
        .h4 { transform: translate(-50%, -50%) translate(198px, 198px); }
        .h5 { transform: translate(-50%, -50%) translate(0px, 280px); }
        .h6 { transform: translate(-50%, -50%) translate(-198px, 198px); }
        .h7 { transform: translate(-50%, -50%) translate(-280px, 0px); }
        .h8 { transform: translate(-50%, -50%) translate(-198px, -198px); }

        @keyframes rotateOrbit { 100% { transform: rotate(360deg); } }
        @keyframes counterRotate { 100% { transform: rotate(-360deg); } }

        .hidden { display: none !important; }

/* ==========================================
   MOBILE & RESPONSIVE STYLING (BREAKPOINTS)
   ========================================== */

@media (max-width: 600px) {
    
    /* 1. MOBILE ONLY BACKGROUND CHANGE */
    #scene-container {
        background-image: url('images/bg 2.jpg'); /* Custom mobile background */
    }

    /* MUCH smaller player wrapper */
    #interactive-wrapper {
        width: 165px;
        height: 215px;
    }

    /* 2. Noticeably smaller Cassette Player Deck */
    #player-deck {
        width: 165px;
        height: 220px;
        padding: 8px;
        border-width: 2.5px;
        border-radius: 12px;
    }

    #cassette-window {
        height: 120px;
        border-radius: 6px;
    }

    /* 3. Scaled-down Polaroid Frame & Text */
    .polaroid-photo-frame {
        width: 80px;
        height: 80px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    #polaroid-message {
        font-size: 6.5px;
        padding: 8px 0 0 0; /* Nudged down slightly for mobile */
        line-height: 1.1;
        letter-spacing: 0.05px;
    }

    /* 4. Compact Cassette Tape */
    #css-cassette {
        width: 90px;
        height: 55px;
        padding: 3px;
    }

    #cassette-title {
        font-size: 6.5px;
    }

    .reels-container {
        transform: scale(0.5);
    }

    /* 5. Smaller Bottom Status Bar & Button */
    #display-window {
        height: 20px;
        line-height: 20px;
        font-size: 7.5px;
    }

    .control-btn {
        padding: 2px 8px;
        font-size: 7.5px;
    }

    /* 6. ADJUSTED ORBIT (Diameter: 295px, Radius: 147.5px) */
    #orbit-container {
        width: 295px; 
        height: 295px;
    }

    /* Recalculated coordinates for exactly 147.5px radius split 8 ways */
    .h1 { transform: translate(-50%, -50%) translate(0px, -147.5px); }
    .h2 { transform: translate(-50%, -50%) translate(104px, -104px); }
    .h3 { transform: translate(-50%, -50%) translate(147.5px, 0px); }
    .h4 { transform: translate(-50%, -50%) translate(104px, 104px); }
    .h5 { transform: translate(-50%, -50%) translate(0px, 147.5px); }
    .h6 { transform: translate(-50%, -50%) translate(-104px, 104px); }
    .h7 { transform: translate(-50%, -50%) translate(-147.5px, 0px); }
    .h8 { transform: translate(-50%, -50%) translate(-104px, -104px); }

    /* Cute, petite hearts for mobile */
    .heart {
        font-size: 22px;
    }

    .heart-num {
        font-size: 6.5px;
        top: 38%;
    }
}
    </style>
</head>
<body>

    <div id="scene-container">
        
        <!-- The Main Interactive Center -->
        <div id="interactive-wrapper">
            
            <!-- The Orbiting Area -->
            <div id="orbit-container">
                <div class="heart-wrapper h1"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">1</span></div></div></div>
                <div class="heart-wrapper h2"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">2</span></div></div></div>
                <div class="heart-wrapper h3"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">3</span></div></div></div>
                <div class="heart-wrapper h4"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">4</span></div></div></div>
                <div class="heart-wrapper h5"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">5</span></div></div></div>
                <div class="heart-wrapper h6"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">6</span></div></div></div>
                <div class="heart-wrapper h7"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">7</span></div></div></div>
                <div class="heart-wrapper h8"><div class="heart-scaler"><div class="heart">❤️<span class="heart-num">8</span></div></div></div>
            </div>

            <!-- The Huge Cassette Player Deck -->
            <div id="player-deck">
                <div id="cassette-window">
                    
                    <!-- Polaroid Frame Inside Cassette -->
                    <div id="cassette-polaroid" class="hidden">
                        <div class="polaroid-photo-frame">
                            <img id="polaroid-image" src="" alt="Memory">
                        </div>
                        <div id="polaroid-message">Sweet message goes here...</div>
                    </div>

                    <!-- Pure CSS Retro Cassette Tape -->
                    <div id="css-cassette">
                        <div id="cassette-title">YOUR SONGS</div>
                        <div class="reels-container">
                            <div class="reel reel-left"></div>
                            <div class="reel reel-right"></div>
                        </div>
                    </div>

                </div>

                <div id="display-window">TAP A HEART TO PLAY</div>
                
                <!-- Music Controls Panel -->
                <div id="controls-panel" class="hidden">
                    <button id="btn-play-pause" class="control-btn">⏸️ Pause</button>
                </div>
            </div>

        </div>

    </div>

    <!-- Hidden Audio Element -->
    <audio id="main-audio" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
